name: OSU RAG ETL Pipeline

on:
  # Run automatically every 6 hours to keep the knowledge base fresh
  schedule:
    - cron: "0 */24 * * *"

  # Also run on every push to main (e.g. config changes take effect immediately)
  push:
    branches:
      - main

  # Allow manual runs from the GitHub Actions UI
  workflow_dispatch:

jobs:
  run-etl:
    name: Crawl & Embed OSU Pages
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. GCP Auth ──────────────────────────────────────────────────────────
      # Authenticates using a Service Account JSON stored as a GitHub secret.
      # The SA needs roles: roles/datastore.user (Firestore read/write)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 4. Run ETL ───────────────────────────────────────────────────────────
      - name: Run ETL pipeline
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          FIRESTORE_COLLECTION: osu-knowledge
          CRAWL_MAX_DEPTH: "6"
          CRAWL_MAX_PAGES: "10000"
          CRAWL_DELAY: ".0000001"
          CRAWL_STRIP_QUERY: "true"
          # Extra ad-hoc exclusions on top of url_exclusions.txt (comma-separated substrings).
          # Add permanent exclusions to url_exclusions.txt instead.
          CRAWL_EXCLUDE_PATTERNS: ""
          BASE_URL_TO_SCRAPE: "oregonstate.edu"
          # Pages with fewer than this many words (after boilerplate removal) are
          # recorded but their outbound links are NOT enqueued. Prevents stub/index
          # pages from spawning large BFS sub-trees.
          CRAWL_MIN_WORDS: "80"
        run: python etl_pipeline.py --crawl

      # ── 5. Upload crawl reports as artifacts ─────────────────────────────────
      # discovered_urls.json  = per-page crawl report (latency, status, links, etc.)
      # url_hashes.json       = dedup state (which pages were skipped vs re-embedded)
      - name: Upload crawl report artifacts
        if: always()   # upload even if the ETL step fails, so we can debug
        uses: actions/upload-artifact@v4
        with:
          name: crawl-report-${{ github.run_number }}
          path: |
            discovered_urls.json
            url_hashes.json
          retention-days: 30
